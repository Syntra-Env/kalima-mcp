[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kalima-mcp-server"
version = "2.0.0"
description = "Quranic Research MCP Server — text analysis, morphological research, and falsification-based linguistic exploration"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.1.0",
    "networkx>=3.2",
    "pyvis>=0.3.2",
]

[project.scripts]
kalima = "kalima.server:main"

[tool.setuptools.packages.find]
where = ["src"]
