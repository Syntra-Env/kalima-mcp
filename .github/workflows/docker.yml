name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/kalima
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository }}/kalima:${{ github.sha }}

      - name: Test MCP tools
        run: |
          docker create --name test-container ghcr.io/${{ github.repository }}/kalima:${{ github.sha }}
          docker cp test_container:/.github/workflows/test_mcp.py /tmp/test_mcp.py 2>/dev/null || true
          docker rm test-container
          docker run --rm ghcr.io/${{ github.repository }}/kalima:${{ github.sha }} \
            python -c "
import asyncio
from mcp.client.stdio import StdioClient

async def test():
    async with StdioClient() as client:
        result = await client.call_tool('get_verse_with_context', {'surah': 1, 'ayah': 1})
        print('get_verse_with_context:', 'OK' if result.content else 'FAIL')
        
        result = await client.call_tool('compare_with_traditional', {'surah': 1, 'ayah': 1})
        print('compare_with_traditional:', 'OK' if result.content else 'FAIL')
        
        result = await client.call_tool('detect_boundaries', {'surah': 1, 'start_ayah': 1, 'end_ayah': 3})
        print('detect_boundaries:', 'OK' if result.content else 'FAIL')
        
        result = await client.call_tool('analyze_verse_emphasis', {'surah': 1, 'ayah': 1})
        print('analyze_verse_emphasis:', 'OK' if result.content else 'FAIL')

asyncio.run(test())
"