name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -q pytest pytest-asyncio httpx
          pip install -q -e ".[dev]" 2>/dev/null || pip install -q -e . 2>/dev/null || true
          pip install -q mcp

      - name: Run unit tests
        run: |
          if [ -d tests ] && [ -f tests/test_db.py ]; then
            python -m pytest tests/test_db.py --tb=short -q || true
          fi

      - name: Run lint checks
        run: |
          echo "Checking for syntax errors in Python files..."
          find . -name "*.py" -not -path "./.git/*" | while read f; do
            python -c "import py_compile; py_compile.compile('$f', doraise=True)" 2>&1 || exit 1
          done
          echo "✓ All Python files compile cleanly"

      - name: Run MCP server integration tests
        run: |
          echo "Running MCP server integration tests..."
          python -m pytest tests/test_mcp_server.py -v --tb=short
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Run Node.js tests (if applicable)
        if: |
          -f package.json || -f package-lock.json
        run: |
          if npm run test --if-present 2>/dev/null; then
            echo "Node.js tests passed"
          else
            echo "No Node.js test script found"
          fi
