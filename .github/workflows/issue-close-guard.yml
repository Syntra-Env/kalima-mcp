name: Issue Close Guard

on:
  issues:
    types: [closed]

jobs:
  verify-tested:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      checks: read
      statuses: read
    steps:
      - name: Check if issue was closed via a PR with passing CI
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Check if issue has "tested" label (manual override)
            const hasTestedLabel = issue.labels.some(l => l.name === 'tested');
            if (hasTestedLabel) {
              console.log('Issue has "tested" label — allowing close.');
              return;
            }

            // 2. Check if issue has "no-test-required" label (docs, discussions, etc.)
            const hasSkipLabel = issue.labels.some(l =>
              l.name === 'no-test-required' || l.name === 'documentation' || l.name === 'question'
            );
            if (hasSkipLabel) {
              console.log('Issue has skip label — allowing close.');
              return;
            }

            // 3. Search for PRs that reference this issue
            const timeline = await github.paginate(
              github.rest.issues.listEventsForTimeline,
              { owner, repo, issue_number: issue.number }
            );

            // Find cross-reference events from merged PRs
            const linkedPRs = [];
            for (const event of timeline) {
              if (event.event === 'cross-referenced' && event.source?.issue?.pull_request) {
                const prNumber = event.source.issue.number;
                const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                if (pr.data.merged) {
                  linkedPRs.push(pr.data);
                }
              }
            }

            if (linkedPRs.length === 0) {
              // No merged PR found — reopen
              console.log('No merged PR found for this issue. Reopening.');
              await github.rest.issues.update({
                owner, repo,
                issue_number: issue.number,
                state: 'open'
              });
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: '🚫 **Issue reopened automatically.**\n\n' +
                      'This issue was closed without a merged pull request that passed CI.\n\n' +
                      'To close this issue:\n' +
                      '1. Create a PR that fixes this issue (use `fixes #' + issue.number + '` in the PR description)\n' +
                      '2. Ensure CI tests pass on the PR\n' +
                      '3. Merge the PR — the issue will close automatically\n\n' +
                      'Or add the `tested` label if you\'ve verified manually, or `no-test-required` for non-code issues.'
              });
              return;
            }

            // 4. Check if the most recent merged PR had passing checks
            const latestPR = linkedPRs[linkedPRs.length - 1];
            const checks = await github.rest.checks.listForRef({
              owner, repo,
              ref: latestPR.merge_commit_sha
            });

            const hasFailure = checks.data.check_runs.some(
              cr => cr.conclusion === 'failure' || cr.conclusion === 'cancelled'
            );

            if (hasFailure) {
              console.log('Merged PR had failing checks. Reopening issue.');
              await github.rest.issues.update({
                owner, repo,
                issue_number: issue.number,
                state: 'open'
              });
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body: '🚫 **Issue reopened automatically.**\n\n' +
                      'PR #' + latestPR.number + ' was merged but had **failing CI checks**.\n' +
                      'Please fix the failing tests and re-merge, or add the `tested` label after manual verification.'
              });
              return;
            }

            console.log('Issue closed via merged PR #' + latestPR.number + ' with passing CI. ✓');
