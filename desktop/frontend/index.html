<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalima</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kalima-bg': '#1e1e1e',
                        'kalima-text': '#d4d4d4',
                        'kalima-accent': '#4ec9b0',
                        'kalima-search': '#9cdcfe',
                        'kalima-annotate': '#ffc66d',
                    },
                    fontFamily: {
                        'arabic': ['Scheherazade New', 'Traditional Arabic', 'Arial', 'sans-serif'],
                        'mono': ['Consolas', 'Monaco', 'Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-kalima-bg text-kalima-text">
    <div id="terminal" class="relative">
        <div id="main-content">
            <div id="output"></div>
            <div id="results"></div>
        </div>
        <div id="input-line">
            <span id="prompt" class="prompt">kalima &gt;</span>
            <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
