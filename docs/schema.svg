<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="Consolas, monospace" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a7fbf"/>
    </marker>
    <marker id="diamond" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 6 0 L 12 6 L 6 12 L 0 6 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="920" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Kalima Database Schema</text>
  <text x="600" y="55" text-anchor="middle" font-size="11" fill="#888">SQLite + WAL mode | Pure hierarchical units | Full FK enforcement</text>

  <!-- ==================== UNITS ==================== -->
  <g transform="translate(60, 80)">
    <rect width="220" height="130" rx="6" fill="#e8f4e8" stroke="#4a8f4a" stroke-width="2"/>
    <rect width="220" height="28" rx="6" fill="#4a8f4a"/>
    <rect width="220" height="14" y="14" fill="#4a8f4a"/>
    <text x="110" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="13">units</text>
    <text x="175" y="19" fill="#c8e8c8" font-size="10">6,350</text>

    <text x="10" y="46" fill="#333" font-weight="bold">id</text>
    <text x="120" y="46" fill="#666">INTEGER PK</text>

    <text x="10" y="64" fill="#333">type</text>
    <text x="120" y="64" fill="#666">TEXT</text>
    <text x="10" y="78" fill="#999" font-size="10">'surah' | 'verse'</text>

    <text x="10" y="96" fill="#333">value</text>
    <text x="120" y="96" fill="#666">INTEGER</text>
    <text x="10" y="110" fill="#999" font-size="10">surah# or ayah#</text>

    <text x="10" y="124" fill="#333">parent_id</text>
    <text x="120" y="124" fill="#666">FK -> units</text>
  </g>

  <!-- Self-referencing arrow for units.parent_id -->
  <path d="M 280,155 C 320,155 320,120 280,120" fill="none" stroke="#4a8f4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="326" y="140" fill="#4a8f4a" font-size="10">parent_id</text>

  <!-- ==================== SURAHS ==================== -->
  <g transform="translate(60, 240)">
    <rect width="220" height="72" rx="6" fill="#f0e8f4" stroke="#7a5a8f" stroke-width="2"/>
    <rect width="220" height="28" rx="6" fill="#7a5a8f"/>
    <rect width="220" height="14" y="14" fill="#7a5a8f"/>
    <text x="110" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="13">surahs</text>
    <text x="185" y="19" fill="#d8c8e8" font-size="10">114</text>

    <text x="10" y="46" fill="#333" font-weight="bold">number</text>
    <text x="120" y="46" fill="#666">INTEGER PK</text>

    <text x="10" y="64" fill="#333">name</text>
    <text x="120" y="64" fill="#666">TEXT</text>
  </g>

  <!-- ==================== WORDS ==================== -->
  <g transform="translate(420, 80)">
    <rect width="280" height="160" rx="6" fill="#e8ecf4" stroke="#4a6abf" stroke-width="2"/>
    <rect width="280" height="28" rx="6" fill="#4a6abf"/>
    <rect width="280" height="14" y="14" fill="#4a6abf"/>
    <text x="140" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="13">words</text>
    <text x="232" y="19" fill="#c8d8f0" font-size="10">77,429</text>

    <text x="10" y="46" fill="#333" font-weight="bold">id</text>
    <text x="160" y="46" fill="#666">TEXT PK</text>
    <text x="10" y="60" fill="#999" font-size="10">"surah:ayah:idx"</text>

    <text x="10" y="78" fill="#333">verse_surah</text>
    <text x="160" y="78" fill="#666">INTEGER</text>

    <text x="10" y="96" fill="#333">verse_ayah</text>
    <text x="160" y="96" fill="#666">INTEGER</text>

    <text x="10" y="114" fill="#333">word_index</text>
    <text x="160" y="114" fill="#666">INTEGER</text>

    <text x="10" y="132" fill="#333">text</text>
    <text x="160" y="132" fill="#666">TEXT</text>

    <text x="10" y="150" fill="#333">normalized_text</text>
    <text x="160" y="150" fill="#666">TEXT</text>
  </g>

  <!-- ==================== MORPHEMES ==================== -->
  <g transform="translate(420, 280)">
    <rect width="280" height="200" rx="6" fill="#f4ece8" stroke="#bf7a4a" stroke-width="2"/>
    <rect width="280" height="28" rx="6" fill="#bf7a4a"/>
    <rect width="280" height="14" y="14" fill="#bf7a4a"/>
    <text x="140" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="13">morphemes</text>
    <text x="232" y="19" fill="#f0dcc8" font-size="10">128,219</text>

    <text x="10" y="46" fill="#333" font-weight="bold">id</text>
    <text x="160" y="46" fill="#666">TEXT PK</text>
    <text x="10" y="60" fill="#999" font-size="10">"mor-S-A-W-M"</text>

    <text x="10" y="78" fill="#333">word_id</text>
    <text x="160" y="78" fill="#666">TEXT NOT NULL FK</text>

    <text x="10" y="96" fill="#333">form</text>
    <text x="160" y="96" fill="#666">TEXT</text>

    <text x="10" y="118" fill="#555" font-size="11" font-style="italic">16 feature FK columns:</text>
    <text x="10" y="134" fill="#888" font-size="10">root_id, lemma_id, pos_id,</text>
    <text x="10" y="148" fill="#888" font-size="10">verb_form_id, voice_id, mood_id,</text>
    <text x="10" y="162" fill="#888" font-size="10">aspect_id, person_id, number_id,</text>
    <text x="10" y="176" fill="#888" font-size="10">gender_id, case_value_id, state_id,</text>
    <text x="10" y="190" fill="#888" font-size="10">dependency_rel_id, derived_noun_type_id, role_id, type_id</text>
  </g>

  <!-- words -> morphemes FK arrow -->
  <line x1="560" y1="240" x2="560" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="566" y="264" fill="#555" font-size="10">word_id</text>

  <!-- ==================== REF_FEATURES ==================== -->
  <g transform="translate(800, 280)">
    <rect width="280" height="200" rx="6" fill="#f4f0e8" stroke="#8f8a4a" stroke-width="2"/>
    <rect width="280" height="28" rx="6" fill="#8f8a4a"/>
    <rect width="280" height="14" y="14" fill="#8f8a4a"/>
    <text x="140" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="13">ref_features</text>
    <text x="240" y="19" fill="#e8e4c8" font-size="10">7,057</text>

    <text x="10" y="46" fill="#333" font-weight="bold">id</text>
    <text x="160" y="46" fill="#666">INTEGER PK</text>

    <text x="10" y="64" fill="#333">feature_type</text>
    <text x="160" y="64" fill="#666">TEXT</text>
    <text x="10" y="78" fill="#999" font-size="10">root, lemma, pos, morph, dep_rel...</text>

    <text x="10" y="96" fill="#333">category</text>
    <text x="160" y="96" fill="#666">TEXT</text>
    <text x="10" y="110" fill="#999" font-size="10">VerbForm, VerbMood, Gender...</text>

    <text x="10" y="128" fill="#333">lookup_key</text>
    <text x="160" y="128" fill="#666">TEXT</text>

    <text x="10" y="146" fill="#333">label_ar</text>
    <text x="160" y="146" fill="#666">TEXT</text>

    <text x="10" y="164" fill="#333">label_en</text>
    <text x="160" y="164" fill="#666">TEXT</text>

    <text x="10" y="182" fill="#333">frequency</text>
    <text x="160" y="182" fill="#666">INTEGER</text>
  </g>

  <!-- morphemes -> ref_features FK arrow (16 FKs) -->
  <line x1="700" y1="380" x2="800" y2="380" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="720" y="372" fill="#555" font-size="10">16 FKs</text>

  <!-- ==================== ENTRIES ==================== -->
  <g transform="translate(60, 530)">
    <rect width="340" height="290" rx="6" fill="#fff8e8" stroke="#bf9f4a" stroke-width="2"/>
    <rect width="340" height="28" rx="6" fill="#bf9f4a"/>
    <rect width="340" height="14" y="14" fill="#bf9f4a"/>
    <text x="170" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="13">entries</text>
    <text x="290" y="19" fill="#f0e8c8" font-size="10">867</text>

    <text x="10" y="46" fill="#333" font-weight="bold">id</text>
    <text x="200" y="46" fill="#666">TEXT PK</text>
    <text x="10" y="60" fill="#999" font-size="10">"entry_N"</text>

    <text x="10" y="78" fill="#333">content</text>
    <text x="200" y="78" fill="#666">TEXT</text>

    <text x="10" y="96" fill="#333">phase</text>
    <text x="200" y="96" fill="#666">TEXT</text>

    <text x="10" y="114" fill="#333">category</text>
    <text x="200" y="114" fill="#666">TEXT</text>

    <text x="10" y="132" fill="#333">confidence</text>
    <text x="200" y="132" fill="#666">REAL</text>

    <text x="10" y="154" fill="#4a6abf" font-weight="bold">feature_id</text>
    <text x="200" y="154" fill="#666">FK -> ref_features</text>
    <text x="10" y="168" fill="#999" font-size="10">UNIQUE — 1 entry per feature</text>

    <text x="10" y="186" fill="#4a8f4a" font-weight="bold">unit_id</text>
    <text x="200" y="186" fill="#666">FK -> units</text>
    <text x="10" y="200" fill="#999" font-size="10">verse evidence location</text>

    <text x="10" y="222" fill="#555" font-size="11" font-style="italic">Inline verification:</text>
    <text x="10" y="238" fill="#888" font-size="10">verse_total, verse_verified,</text>
    <text x="10" y="252" fill="#888" font-size="10">verse_supports, verse_contradicts,</text>
    <text x="10" y="266" fill="#888" font-size="10">verse_unclear, verse_current_index,</text>
    <text x="10" y="280" fill="#888" font-size="10">verse_queue (JSON), timestamps</text>
  </g>

  <!-- entries.unit_id -> units FK arrow -->
  <path d="M 170,530 L 170,210" fill="none" stroke="#4a8f4a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="136" y="440" fill="#4a8f4a" font-size="10" transform="rotate(-90, 136, 440)">unit_id</text>

  <!-- entries.feature_id -> ref_features FK arrow -->
  <path d="M 400,684 L 800,400" fill="none" stroke="#4a7fbf" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="580" y="530" fill="#4a7fbf" font-size="10">feature_id</text>

  <!-- ==================== DEPENDENCIES ==================== -->
  <g transform="translate(500, 600)">
    <rect width="280" height="120" rx="6" fill="#f4e8e8" stroke="#bf4a4a" stroke-width="2"/>
    <rect width="280" height="28" rx="6" fill="#bf4a4a"/>
    <rect width="280" height="14" y="14" fill="#bf4a4a"/>
    <text x="140" y="19" text-anchor="middle" fill="white" font-weight="bold" font-size="13">dependencies</text>
    <text x="240" y="19" fill="#f0c8c8" font-size="10">204</text>

    <text x="10" y="46" fill="#333" font-weight="bold">entry_id</text>
    <text x="170" y="46" fill="#666">TEXT PK(1) FK</text>

    <text x="10" y="64" fill="#333" font-weight="bold">depends_on_entry_id</text>
    <text x="170" y="64" fill="#666">TEXT PK(2) FK</text>

    <text x="10" y="82" fill="#333" font-weight="bold">dependency_type</text>
    <text x="170" y="82" fill="#666">TEXT PK(3)</text>
    <text x="10" y="96" fill="#999" font-size="10">supports | contradicts | depends_on | refines | related</text>

    <text x="10" y="114" fill="#333">created_at</text>
    <text x="170" y="114" fill="#666">TEXT</text>
  </g>

  <!-- dependencies -> entries arrows -->
  <path d="M 500,650 L 400,650" fill="none" stroke="#bf4a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="424" y="644" fill="#bf4a4a" font-size="10">entry_id</text>

  <path d="M 500,670 L 400,700" fill="none" stroke="#bf4a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="414" y="692" fill="#bf4a4a" font-size="10">depends_on</text>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(800, 560)">
    <rect width="300" height="200" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
    <text x="150" y="22" text-anchor="middle" font-weight="bold" fill="#555" font-size="13">Legend</text>

    <line x1="20" y1="42" x2="80" y2="42" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="90" y="46" fill="#555" font-size="11">Foreign key</text>

    <line x1="20" y1="66" x2="80" y2="66" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
    <text x="90" y="70" fill="#555" font-size="11">Nullable FK</text>

    <path d="M 20,90 C 60,90 60,78 20,78" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="90" y="88" fill="#555" font-size="11">Self-referencing FK</text>

    <rect x="20" y="102" width="14" height="14" rx="2" fill="#e8f4e8" stroke="#4a8f4a"/>
    <text x="90" y="114" fill="#555" font-size="11">Quranic structure</text>

    <rect x="20" y="124" width="14" height="14" rx="2" fill="#e8ecf4" stroke="#4a6abf"/>
    <rect x="38" y="124" width="14" height="14" rx="2" fill="#f4ece8" stroke="#bf7a4a"/>
    <text x="90" y="136" fill="#555" font-size="11">Linguistic data</text>

    <rect x="20" y="146" width="14" height="14" rx="2" fill="#fff8e8" stroke="#bf9f4a"/>
    <rect x="38" y="146" width="14" height="14" rx="2" fill="#f4e8e8" stroke="#bf4a4a"/>
    <text x="90" y="158" fill="#555" font-size="11">Research data</text>

    <text x="20" y="182" fill="#888" font-size="10">PK = Primary Key | FK = Foreign Key</text>
    <text x="20" y="194" fill="#888" font-size="10">Row counts shown in table headers</text>
  </g>

  <!-- ==================== HIERARCHY CALLOUT ==================== -->
  <g transform="translate(800, 80)">
    <rect width="300" height="170" rx="6" fill="white" stroke="#4a8f4a" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="150" y="22" text-anchor="middle" font-weight="bold" fill="#4a8f4a" font-size="12">Units Hierarchy</text>

    <text x="20" y="50" fill="#333" font-size="12" font-weight="bold">surah</text>
    <text x="80" y="50" fill="#888" font-size="11">value=2, parent=NULL</text>

    <line x1="40" y1="58" x2="40" y2="74" stroke="#4a8f4a" stroke-width="1"/>
    <text x="50" y="74" fill="#333" font-size="12" font-weight="bold">verse</text>
    <text x="100" y="74" fill="#888" font-size="11">value=255, parent=surah</text>

    <line x1="60" y1="86" x2="60" y2="100" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="70" y="102" fill="#999" font-size="11" font-style="italic">word</text>
    <text x="110" y="102" fill="#bbb" font-size="10">(in words table, not units)</text>

    <line x1="80" y1="112" x2="80" y2="126" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="90" y="128" fill="#999" font-size="11" font-style="italic">morpheme</text>
    <text x="160" y="128" fill="#bbb" font-size="10">(in morphemes table)</text>

    <text x="20" y="158" fill="#888" font-size="10">Full address: walk parent_id chain</text>
  </g>
</svg>
